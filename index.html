<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Adaptive Theme</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <input type="checkbox" id="theme-toggle" class="theme-checkbox">

    <div class="site-wrapper">
        <nav class="navbar">
            <div class="nav-content">
                <a href="#" class="logo">JD<span>.</span></a>
                <div class="nav-right">
                    <label for="theme-toggle" class="toggle-label">
                        <span class="sun">☀️</span>
                        <span class="moon">🌙</span>
                    </label>
                    <div class="nav-links">
                        <a href="#work">Work</a>
                        <a href="#contact" class="cta-pill">Contact</a>
                    </div>
                </div>
            </div>
        </nav>

        <header class="hero">
            <div class="container">
                <div class="badge">Theme-Aware Interface</div>
                <h1>Design that <span class="text-gradient">Adapts</span>.</h1>
                <p>A professional portfolio built to look stunning in both light and deep night modes.</p>
                <div class="hero-actions">
                    <a href="#work" class="btn-primary">Explore Projects</a>
                </div>
            </div>
        </header>

        <section id="work" class="work">
            <div class="container">
                <div class="work-grid">
                    <div class="project-card">
                        <div class="image-box"></div>
                        <div class="project-content">
                            <span class="category">System Design</span>
                            <h3>Adaptive Dashboard</h3>
                        </div>
                    </div>
                    <div class="project-card">
                        <div class="image-box"></div>
                        <div class="project-content">
                            <span class="category">Web Architecture</span>
                            <h3>Performance Engine</h3>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
